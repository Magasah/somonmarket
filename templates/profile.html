<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | Somon Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0c10;
            --card: #14151c;
            --accent: #00ffb0;
            --accent-2: #7a5bff;
            --text: #e5e5e5;
            --muted: #9aa0b5;
            --shadow: 0 12px 30px rgba(0,0,0,0.35);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 16px;
            background: radial-gradient(circle at 20% 20%, rgba(122,91,255,0.12), transparent 35%),
                        radial-gradient(circle at 80% 10%, rgba(0,255,176,0.12), transparent 30%),
                        var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .avatar {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: grid; place-items: center;
            font-size: 26px; color: #0b0c10; font-weight: 800;
            box-shadow: var(--shadow);
        }
        .name { font-size: 18px; font-weight: 700; }
        .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
            border-radius: 999px; background: rgba(0,255,176,0.12); color: var(--accent); font-size: 12px; }

        .card {
            background: linear-gradient(135deg, rgba(0,255,176,0.08), rgba(122,91,255,0.08));
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }
        .balance-title { color: var(--muted); font-size: 13px; letter-spacing: 0.5px; }
        .balance-value { font-size: 28px; font-weight: 800; margin: 6px 0 10px; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 14px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 700; font-size: 14px; transition: transform 0.08s ease, box-shadow 0.08s ease;
        }
        .btn-primary { background: var(--accent); color: #0b0c10; box-shadow: 0 10px 24px rgba(0,255,176,0.35); }
        .btn-primary:active { transform: translateY(1px); }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat {
            background: var(--card); padding: 12px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: var(--shadow);
        }
        .stat label { color: var(--muted); font-size: 12px; }
        .stat .value { font-size: 18px; font-weight: 700; margin-top: 6px; }

        .tabs { display: flex; gap: 8px; margin: 12px 0; }
        .tab {
            flex: 1;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--muted);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .tab.active {
            color: #0b0c10;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-color: transparent;
            box-shadow: 0 10px 24px rgba(0,255,176,0.32);
        }

        .list {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 14px;
            box-shadow: var(--shadow);
        }
        .empty {
            color: var(--muted);
            text-align: center;
            padding: 18px 8px;
        }
    </style>
</head>
<body>
    <header>
        <div class="avatar"><i class="fa-regular fa-user"></i></div>
        <div>
            <div class="name">{{ profile.name }}</div>
            <div class="badge"><i class="fa-solid fa-shield-halved"></i> Verified</div>
        </div>
    </header>

    <section class="card">
        <div class="balance-title">Баланс</div>
        <div class="balance-value">{{ '%.2f' % profile.balance }} TJS</div>
        <button class="btn btn-primary">Пополнить</button>
    </section>

    <section class="stats">
        <div class="stat">
            <label>Рейтинг</label>
            <div class="value">{{ '%.1f' % profile.rating }} ⭐️</div>
        </div>
        <div class="stat">
            <label>Сделки</label>
            <div class="value">{{ profile.deals }}</div>
        </div>
    </section>

    <div class="tabs">
        <div class="tab active" id="tab-items">Мои товары</div>
        <div class="tab" id="tab-history">История покупок</div>
    </div>

    <div class="list" id="list-content">
        <div class="empty">Пока пусто. Добавьте первое объявление 🚀</div>
    </div>

    <script>
        const tabItems = document.getElementById('tab-items');
        const tabHistory = document.getElementById('tab-history');
        const list = document.getElementById('list-content');

        tabItems.addEventListener('click', () => {
            tabItems.classList.add('active');
            tabHistory.classList.remove('active');
            list.innerHTML = '<div class="empty">Пока пусто. Добавьте первое объявление 🚀</div>';
        });

        tabHistory.addEventListener('click', () => {
            tabHistory.classList.add('active');
            tabItems.classList.remove('active');
            list.innerHTML = '<div class="empty">Нет покупок. Совершите первую покупку 🛒</div>';
        });
    </script>
</body>
</html>
